name: Auto PR To Main

on:
  push:
    branches:
      - github-main-sync

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-main
  cancel-in-progress: false

jobs:
  ensure-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure pull request exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:github-main-sync`;
            const base = "main";

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 100
            });

            if (pulls.length > 0) {
              core.info(`Open PR already exists: #${pulls[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: "Auto sync github-main-sync -> main",
              head: "github-main-sync",
              base,
              body: [
                "This PR was created automatically after a push to `github-main-sync`.",
                "",
                "Review the diff, then merge into `main` when ready."
              ].join("\n")
            });

            core.info(`Created PR #${pr.number}`);
