name: Auto PR To Main

on:
  push:
    branches:
      - github-main-sync
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-main
  cancel-in-progress: false

jobs:
  ensure-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure pull request exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headRef = "github-main-sync";
            const head = `${owner}:${headRef}`;
            const base = "main";

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "all",
              head,
              base,
              per_page: 100
            });

            if (pulls.length > 0) {
              const latest = pulls[0];
              if (latest.state === "open") {
                core.info(`Open PR already exists: #${latest.number}`);
                return;
              }

              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: latest.number,
                  state: "open"
                });
                core.info(`Reopened PR #${latest.number}`);
                return;
              } catch (e) {
                core.warning(
                  `Failed to reopen PR #${latest.number}, will try creating a new PR. ${e.message}`
                );
              }
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: "Auto sync github-main-sync -> main",
              head: headRef,
              base,
              body: [
                "This PR was created automatically after a push to `github-main-sync`.",
                "",
                "Review the diff, then merge into `main` when ready."
              ].join("\n")
            });

            core.info(`Created PR #${pr.number}`);
